{% extends "base.html" %}
{% block title %}AI Mock Exam - MedhaRank{% endblock %}

{% block content %}
<style>
.mock-exam-container {
    max-width: 800px;
    margin: 2rem auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    padding: 2rem;
    position: relative;
}

.timer-bar {
    width: 100%;
    height: 10px;
    background: #e0e0e0;
    border-radius: 5px;
    overflow: hidden;
    margin-bottom: 1.5rem;
}

.timer-fill {
    height: 100%;
    background: var(--primary);
    width: 100%;
    transition: width 1s linear;
}

.timer-text {
    font-size: 1.5rem;
    font-weight: bold;
    color: var(--primary);
    text-align: right;
    margin-bottom: 0.5rem;
}

.question-text {
    font-size: 1.3rem;
    margin-bottom: 1.5rem;
    color: #333;
}

.options-grid {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.option-btn {
    padding: 1rem;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.2s;
    text-align: left;
}

.option-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: #f0f8ff;
}

.option-btn.correct {
    border-color: #28a745;
    background: #d4edda;
    color: #155724;
}

.option-btn.wrong {
    border-color: #dc3545;
    background: #f8d7da;
    color: #721c24;
}

.loading-state {
    text-align: center;
    padding: 3rem;
}

.explanation-box {
    margin-top: 2rem;
    padding: 1rem;
    background: #e9ecef;
    border-radius: 8px;
    display: none;
}

.ai-badge {
    background: linear-gradient(135deg, #6e8efb, #a777e3);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: bold;
    display: inline-block;
    margin-bottom: 1rem;
}
</style>

<div class="mock-exam-container" id="exam-container">
    <div id="loading" class="loading-state">
        <span class="material-symbols-outlined" style="font-size: 3rem; animation: spin 2s linear infinite;">hourglass_empty</span>
        <h2>Generating your next question...</h2>
        <p>Using AI tailored to your goal ({{ user['goal'] if user['goal'] else 'General' }}).</p>
    </div>

    <div id="question-area" style="display: none;">
        <div id="ai-indicator"></div>
        <div class="timer-text" id="timer-text">10s</div>
        <div class="timer-bar">
            <div class="timer-fill" id="timer-fill"></div>
        </div>
        
        <div class="question-text" id="question-text"></div>
        
        <div class="options-grid" id="options-grid">
            <!-- Options will be injected here -->
        </div>

        <div class="explanation-box" id="explanation-box">
            <strong>Explanation:</strong>
            <p id="explanation-text"></p>
        </div>
    </div>
</div>

<script>
let currentQuestion = null;
let timerInterval;
let timeLeft = 10;
const TIME_LIMIT = 10;

function fetchNextQuestion() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('question-area').style.display = 'none';
    document.getElementById('explanation-box').style.display = 'none';
    
    fetch('/api/generate-mock-question')
        .then(res => res.json())
        .then(data => {
            if (data.error && !data.question) {
                alert("Error: " + data.error);
                return;
            }
            currentQuestion = data;
            renderQuestion();
        })
        .catch(err => {
            console.error(err);
            alert("Failed to load question. Retrying...");
            setTimeout(fetchNextQuestion, 2000);
        });
}

function renderQuestion() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('question-area').style.display = 'block';
    
    // AI Indicator
    const aiIndicator = document.getElementById('ai-indicator');
    if (currentQuestion.is_ai) {
        aiIndicator.innerHTML = '<span class="ai-badge">✨ AI Generated</span>';
    } else {
        aiIndicator.innerHTML = '<span class="ai-badge" style="background: #6c757d;">Original Question</span>';
    }

    document.getElementById('question-text').innerText = currentQuestion.question;
    
    const optionsGrid = document.getElementById('options-grid');
    optionsGrid.innerHTML = '';
    
    for (const [key, value] of Object.entries(currentQuestion.options)) {
        if (!value) continue;
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = `${key.toUpperCase()}. ${value}`;
        btn.onclick = () => selectOption(key, btn);
        optionsGrid.appendChild(btn);
    }
    
    startTimer();
}

function startTimer() {
    timeLeft = TIME_LIMIT;
    updateTimerUI();
    
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            handleTimeout();
        }
    }, 1000);
}

function updateTimerUI() {
    document.getElementById('timer-text').innerText = `${timeLeft}s`;
    const percent = (timeLeft / TIME_LIMIT) * 100;
    document.getElementById('timer-fill').style.width = `${percent}%`;
}

function selectOption(selectedKey, btnElement) {
    clearInterval(timerInterval);
    revealAnswer(selectedKey, btnElement);
}

function handleTimeout() {
    revealAnswer(null, null);
}

function revealAnswer(selectedKey, btnElement) {
    const correctKey = currentQuestion.correct.toLowerCase();
    
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(btn => {
        btn.disabled = true;
        const btnKey = btn.innerText.charAt(0).toLowerCase();
        
        if (btnKey === correctKey) {
            btn.classList.add('correct');
        } else if (btnKey === selectedKey && selectedKey !== correctKey) {
            btn.classList.add('wrong');
        }
    });
    
    if (currentQuestion.explanation) {
        document.getElementById('explanation-box').style.display = 'block';
        document.getElementById('explanation-text').innerText = currentQuestion.explanation;
    }
    
    // Automatically fetch next question after 4 seconds
    setTimeout(fetchNextQuestion, 4000);
}

// Start first question
document.addEventListener("DOMContentLoaded", fetchNextQuestion);
</script>

<style>
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
{% endblock %}
