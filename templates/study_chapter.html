{% extends "base.html" %}

{% block title %}Study — {{ chapter['title'] }}{% endblock %}

{% block content %}
<style>
    .pdf-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #f4f6f8;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        margin-top: 20px;
    }
    #pdf-render {
        border: 1px solid #ccc;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        max-width: 100%;
        background: white;
    }
    .pdf-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 800px;
        margin-bottom: 15px;
    }
    .pdf-controls button {
        padding: 8px 16px;
        font-size: 1rem;
        cursor: pointer;
        background-color: #4a90e2;
        color: white;
        border: none;
        border-radius: 4px;
        transition: background 0.3s;
    }
    .pdf-controls button:hover:not(:disabled) {
        background-color: #357abd;
    }
    .pdf-controls button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
    }
    .page-info {
        font-size: 1.1rem;
        font-weight: bold;
    }
</style>

<div class="header-banner">
    <h2>{{ subject['name'] }} - {{ chapter['title'] }}</h2>
    <a href="{{ url_for('study_subject', subject_id=subject['id']) }}" class="btn btn-secondary">← Back to Chapters</a>
</div>

<div class="pdf-container">
    {% if pdf_filename %}
        <div class="pdf-controls">
            <button id="prev-page" disabled>Previous Page</button>
            <span class="page-info">Page <span id="page-num"></span> of <span id="page-count"></span></span>
            <button id="next-page" disabled>Next Page</button>
        </div>
        <canvas id="pdf-render"></canvas>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
        <script>
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

            const url = "{{ url_for('serve_note', subject_id=subject['id'], chapter_id=chapter['id'], filename=pdf_filename) }}";
            
            let pdfDoc = null,
                pageNum = 1,
                pageIsRendering = false,
                pageNumIsPending = null;

            // use a smaller scale for smaller screens
            const scale = window.innerWidth > 800 ? 1.5 : 1.0,
                  canvas = document.querySelector('#pdf-render'),
                  ctx = canvas.getContext('2d');

            const renderPage = num => {
                pageIsRendering = true;
                
                pdfDoc.getPage(num).then(page => {
                    const viewport = page.getViewport({ scale });
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderCtx = {
                        canvasContext: ctx,
                        viewport
                    };

                    page.render(renderCtx).promise.then(() => {
                        pageIsRendering = false;

                        if (pageNumIsPending !== null) {
                            renderPage(pageNumIsPending);
                            pageNumIsPending = null;
                        }
                    });

                    document.querySelector('#page-num').textContent = num;
                    
                    document.querySelector('#prev-page').disabled = (num <= 1);
                    document.querySelector('#next-page').disabled = (num >= pdfDoc.numPages);
                });
            };

            const queueRenderPage = num => {
                if (pageIsRendering) {
                    pageNumIsPending = num;
                } else {
                    renderPage(num);
                }
            };

            const showPrevPage = () => {
                if (pageNum <= 1) return;
                pageNum--;
                queueRenderPage(pageNum);
            };

            const showNextPage = () => {
                if (pageNum >= pdfDoc.numPages) return;
                pageNum++;
                queueRenderPage(pageNum);
            };

            pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
                pdfDoc = pdfDoc_;
                document.querySelector('#page-count').textContent = pdfDoc.numPages;
                renderPage(pageNum);
            }).catch(err => {
                const div = document.createElement('div');
                div.className = 'error';
                div.appendChild(document.createTextNode(err.message));
                document.querySelector('.pdf-container').insertBefore(div, canvas);
            });

            document.querySelector('#prev-page').addEventListener('click', showPrevPage);
            document.querySelector('#next-page').addEventListener('click', showNextPage);
        </script>
    {% else %}
        <div class="empty-state">
            <span class="empty-icon material-symbols-outlined" style="font-size: 3rem;">description</span>
            <p>No notes available for this chapter yet.</p>
        </div>
    {% endif %}
</div>
{% endblock %}
